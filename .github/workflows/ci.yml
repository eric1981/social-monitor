name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint with ruff
        run: ruff check . --exclude social-auto-upload

      - name: Check Python syntax
        run: |
          find . -name '*.py' -not -path './social-auto-upload/*' -not -path './.venv/*' | while read f; do
            python -m py_compile "$f" && echo "OK: $f" || echo "FAIL: $f"
          done

